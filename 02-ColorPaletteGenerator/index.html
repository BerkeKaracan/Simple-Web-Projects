<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
  </head>
  <body>
    <main>
      <div class="general-top js-general-top">
        <header>
          Color Palette Generator
          <div class="line js-line"></div>
        </header>
      </div>
      <button class="random-button js-random-button">
        <svg
          class="refresh-svg js-refresh-svg"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"
          />
        </svg>
        Generate Palette
      </button>

      <div class="general-bottom js-general-bottom">
        <div class="bottom-section js-bottom-section">
          <div class="color-area-1 js-color-area-1">
            <div class="color-box js-color-box"></div>
            <span class="hex-code js-hex-code"></span>
            <button class="copy-button js-copy-button"></button>
          </div>

          <div class="color-area-2">
            <div class="color-box js-color-box"></div>
            <span class="hex-code js-hex-code"></span>
            <button class="copy-button js-copy-button"></button>
          </div>

          <div class="color-area-3">
            <div class="color-box js-color-box"></div>
            <span class="hex-code js-hex-code"></span>
            <button class="copy-button js-copy-button"></button>
          </div>

          <div class="color-area-4">
            <div class="color-box js-color-box"></div>
            <span class="hex-code js-hex-code"></span>
            <button class="copy-button js-copy-button"></button>
          </div>

          <div class="color-area-5">
            <div class="color-box js-color-box"></div>
            <span class="hex-code js-hex-code"></span>
            <button class="copy-button js-copy-button"></button>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
