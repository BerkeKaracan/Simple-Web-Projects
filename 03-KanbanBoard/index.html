<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanbanBoard</title>
  </head>
  <body>
    <header>Simple Kanban Board</header>
    <div class="main-container">
      <div class="to-do-box">
        <h3>To do</h3>
        <div class="task" draggable="true">Wash dishes</div>
        <div class="task" draggable="true">Buy groceries</div>
      </div>
      <div class="in-progress-box">
        <h3>In progress</h3>
        <div class="task" draggable="true">Learn to code</div>
      </div>
      <div class="done-box">
        <h3>Done</h3>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
